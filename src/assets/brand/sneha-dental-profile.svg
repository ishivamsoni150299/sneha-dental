<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000" role="img" aria-label="Sneha Dental profile picture">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="50%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="toothFill" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <filter id="toothGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#93c5fd" flood-opacity="0.5"/>
    </filter>
    <!-- Clip to circle for profile-picture safe rendering -->
    <clipPath id="circleClip">
      <circle cx="500" cy="500" r="500"/>
    </clipPath>
  </defs>

  <!-- Clip everything to circle -->
  <g clip-path="url(#circleClip)">

    <!-- Background gradient -->
    <rect width="1000" height="1000" fill="url(#bgGrad)"/>

    <!-- Subtle grid / dot texture -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="rgba(255,255,255,0.08)"/>
    </pattern>
    <rect width="1000" height="1000" fill="url(#dots)"/>

    <!-- Decorative arc rings -->
    <circle cx="500" cy="500" r="420" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="none"/>
    <circle cx="500" cy="500" r="460" stroke="rgba(255,255,255,0.04)" stroke-width="1" fill="none"/>

    <!-- Soft glow center -->
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#3b82f6; stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:transparent; stop-opacity:0"/>
    </radialGradient>
    <circle cx="500" cy="450" r="350" fill="url(#centerGlow)"/>

    <!-- Tooth icon — large, centered, white with glow -->
    <!-- Scale: original 100x100 path scaled up ~6x, centered at 500,480 -->
    <g transform="translate(320, 200) scale(3.6)" filter="url(#toothGlow)">
      <path d="M50 18
        C40 18 26 25 25 37
        C24 48 29 55 35 60
        L32 86
        C31 94 34 102 40 102
        C46 102 48 96 48 88
        L49 72
        C49.5 68 50.5 68 51 72
        L52 88
        C52 96 54 102 60 102
        C66 102 69 94 68 86
        L65 60
        C71 55 76 48 75 37
        C74 25 60 18 50 18 Z"
        fill="url(#toothFill)"/>

      <!-- Inner shadow for depth -->
      <path d="M50 18
        C40 18 26 25 25 37
        C24 43 26 49 30 54"
        stroke="rgba(147,197,253,0.3)" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- Sparkle highlight arc on tooth -->
      <path d="M32 27 C35 23 39 21 42 22"
        stroke="rgba(255,255,255,0.65)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- 3-point star sparkle (top-right of tooth) -->
    <g transform="translate(680, 245)" opacity="0.9">
      <path d="M0,-18 L4,-4 L18,0 L4,4 L0,18 L-4,4 L-18,0 L-4,-4 Z" fill="white"/>
    </g>
    <circle cx="730" cy="210" r="5" fill="rgba(255,255,255,0.6)"/>
    <circle cx="700" cy="195" r="3" fill="rgba(255,255,255,0.4)"/>

    <!-- Small sparkle bottom-left -->
    <g transform="translate(290, 560)" opacity="0.5">
      <path d="M0,-10 L2,-2 L10,0 L2,2 L0,10 L-2,2 L-10,0 L-2,-2 Z" fill="white"/>
    </g>

    <!-- Clinic name — bottom section -->
    <!-- Decorative line above text -->
    <line x1="280" y1="830" x2="720" y2="830" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

    <text x="500" y="885"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="88"
      font-weight="800"
      fill="white"
      text-anchor="middle"
      letter-spacing="-1">SNEHA</text>

    <text x="500" y="944"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="44"
      font-weight="400"
      fill="rgba(147,197,253,0.9)"
      text-anchor="middle"
      letter-spacing="12">DENTAL</text>

  </g>
</svg>
