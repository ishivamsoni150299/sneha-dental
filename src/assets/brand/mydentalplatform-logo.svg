<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B9EFF"/>
      <stop offset="50%" stop-color="#0A6BFF"/>
      <stop offset="100%" stop-color="#1E7BFF"/>
    </linearGradient>
    <linearGradient id="smileGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B9EFF"/>
      <stop offset="50%" stop-color="#0A6BFF"/>
      <stop offset="100%" stop-color="#1E7BFF"/>
    </linearGradient>
  </defs>

  <!-- Black background -->
  <rect width="100" height="100" fill="#000000"/>

  <!-- Blue ring — stroke sized to stay visible at 28–40px -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#ringGrad)" stroke-width="3.5"/>

  <!-- Smile crescent (proportionally scaled from 1080 viewbox) -->
  <path d="M 24 57 Q 50 73 76 57 Q 50 68 24 57 Z" fill="url(#smileGrad)"/>
</svg>
