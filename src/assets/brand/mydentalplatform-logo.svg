<svg width="760" height="260" viewBox="0 0 760 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="mydentalplatform — Dental Practice Management SaaS">
  <defs>

    <!-- Brand gradient: sky → deep blue -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>

    <!-- Horizontal brand gradient for text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>

    <!-- Vertical accent bar gradient -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#38BDF8"/>
      <stop offset="75%"  stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0"/>
    </linearGradient>

    <!-- Tooth fill -->
    <linearGradient id="toothFill" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>

    <!-- Radial glow behind icon -->
    <radialGradient id="iconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1D4ED8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient background glow (left-center) -->
    <radialGradient id="bgGlow" cx="18%" cy="50%" r="38%">
      <stop offset="0%"   stop-color="#1E40AF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#020617"  stop-opacity="0"/>
    </radialGradient>

    <!-- Tooth glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft text glow -->
    <filter id="softGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>

    <!-- Dot grid pattern -->
    <pattern id="grid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.9" fill="rgba(148,163,184,0.07)"/>
    </pattern>

    <!-- Rounded clip -->
    <clipPath id="card">
      <rect width="760" height="260" rx="24"/>
    </clipPath>

  </defs>

  <g clip-path="url(#card)">

    <!-- ── Background ──────────────────────────────────────────────── -->
    <rect width="760" height="260" fill="#020617"/>
    <rect width="760" height="260" fill="url(#grid)"/>
    <rect width="760" height="260" fill="url(#bgGlow)"/>

    <!-- ── Left accent bar ─────────────────────────────────────────── -->
    <rect x="0" y="0" width="5" height="260" fill="url(#barGrad)"/>

    <!-- ── Icon section ────────────────────────────────────────────── -->

    <!-- Outer glow halo -->
    <circle cx="102" cy="130" r="62" fill="url(#iconGlow)"/>

    <!-- Badge ring -->
    <circle cx="102" cy="130" r="50"
            fill="rgba(15,23,42,0.85)"
            stroke="rgba(56,189,248,0.22)"
            stroke-width="1.2"/>

    <!-- Inner badge ring -->
    <circle cx="102" cy="130" r="42"
            fill="none"
            stroke="rgba(56,189,248,0.10)"
            stroke-width="0.8"/>

    <!-- Tooth icon — crown centered at (102,130), height ≈ 66px -->
    <g filter="url(#glow)">
      <path d="M102 97
        C93 97 81 104 80 113
        C79 121 83 127 87 131
        L85 151
        C84 158 87 164 91 164
        C96 164 97 159 97 153
        L98 142
        C98.5 139 105.5 139 106 142
        L107 153
        C107 159 109 164 114 164
        C119 164 122 158 121 151
        L119 131
        C123 127 127 121 126 113
        C125 104 111 97 102 97 Z"
        fill="url(#toothFill)"/>

      <!-- Crown highlight arc -->
      <path d="M88 107 C91 103 95 101 99 102"
            stroke="rgba(255,255,255,0.65)"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"/>

      <!-- Root divider groove -->
      <path d="M102 142 L102 154"
            stroke="rgba(147,197,253,0.30)"
            stroke-width="1.2"
            fill="none"
            stroke-linecap="round"/>
    </g>

    <!-- Sparkle star top-right of tooth -->
    <g transform="translate(143, 87)" opacity="0.92">
      <path d="M0,-8 L1.8,-1.8 L8,0 L1.8,1.8 L0,8 L-1.8,1.8 L-8,0 L-1.8,-1.8 Z"
            fill="#38BDF8"/>
    </g>
    <circle cx="152" cy="79"  r="2.2" fill="rgba(56,189,248,0.55)"/>
    <circle cx="145" cy="76"  r="1.4" fill="rgba(56,189,248,0.35)"/>

    <!-- Small medical cross (bottom-left of badge) -->
    <g transform="translate(65, 162)" opacity="0.35">
      <rect x="-1.2" y="-5" width="2.4" height="10" rx="1.2" fill="#38BDF8"/>
      <rect x="-5"   y="-1.2" width="10" height="2.4" rx="1.2" fill="#38BDF8"/>
    </g>

    <!-- ── Typography ──────────────────────────────────────────────── -->

    <!-- Category label -->
    <text x="176" y="101"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="9.5"
          font-weight="600"
          fill="rgba(56,189,248,0.65)"
          letter-spacing="3.5">DENTAL PRACTICE MANAGEMENT</text>

    <!-- Main brand name -->
    <text y="150"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="42"
          letter-spacing="-1">
      <tspan x="176" font-weight="300" fill="#CBD5E1">my</tspan><tspan font-weight="800" fill="url(#textGrad)" filter="url(#softGlow)">dental</tspan><tspan font-weight="300" fill="#94A3B8">platform</tspan>
    </text>

    <!-- Underline accent beneath "dental" (approx x=218 to x=374) -->
    <rect x="218" y="157" width="154" height="2.5" rx="1.25" fill="url(#textGrad)" opacity="0.75"/>

    <!-- Tagline -->
    <text x="176" y="182"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="12"
          font-weight="400"
          fill="rgba(100,116,139,0.85)"
          letter-spacing="0.3">
      Manage every clinic · Delight every patient
    </text>

    <!-- ── Right decorative data-viz bars ─────────────────────────── -->
    <g opacity="0.14" transform="translate(672, 68)">
      <rect x="0"  y="0"   width="4" height="124" rx="2" fill="#38BDF8"/>
      <rect x="12" y="18"  width="4" height="88"  rx="2" fill="#38BDF8"/>
      <rect x="24" y="8"   width="4" height="108" rx="2" fill="#60A5FA"/>
      <rect x="36" y="30"  width="4" height="64"  rx="2" fill="#1D4ED8"/>
      <rect x="48" y="14"  width="4" height="96"  rx="2" fill="#1D4ED8"/>
      <rect x="60" y="44"  width="4" height="36"  rx="2" fill="#38BDF8"/>
    </g>

    <!-- ── Bottom vignette ─────────────────────────────────────────── -->
    <rect x="0" y="210" width="760" height="50"
          fill="url(#bgVig)" opacity="0.5"/>

    <!-- Subtle border glow on card edge -->
    <rect width="760" height="260" rx="24"
          fill="none"
          stroke="rgba(56,189,248,0.10)"
          stroke-width="1.5"/>

  </g>
</svg>
