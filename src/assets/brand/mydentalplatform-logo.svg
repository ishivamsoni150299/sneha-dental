<svg width="760" height="260" viewBox="0 0 760 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="mydentalplatform">
  <defs>

    <!-- Sky → deep blue brand gradient -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>

    <!-- Horizontal gradient for "dental" text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38BDF8"/>
      <stop offset="55%"  stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <!-- Vertical left accent bar -->
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="22%"  stop-color="#0EA5E9"/>
      <stop offset="78%"  stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0"/>
    </linearGradient>

    <!-- Icon badge background -->
    <radialGradient id="badgeBg" cx="45%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0C1445"/>
    </radialGradient>

    <!-- Tooth fill — white to ice blue -->
    <linearGradient id="toothFill" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>

    <!-- Background ambient glow (left side) -->
    <radialGradient id="ambientL" cx="15%" cy="50%" r="42%">
      <stop offset="0%"   stop-color="#1D4ED8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#020617"  stop-opacity="0"/>
    </radialGradient>

    <!-- Tooth drop-shadow glow -->
    <filter id="toothGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.22
                0 0 0 0 0.55
                0 0 0 0 0.98
                0 0 0 0.6 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- "dental" text subtle glow -->
    <filter id="textGlow" x="-8%" y="-60%" width="116%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot grid texture -->
    <pattern id="dots" x="0" y="0" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="0.85" fill="rgba(148,163,184,0.065)"/>
    </pattern>

    <!-- Card clip (rounded corners) -->
    <clipPath id="card">
      <rect width="760" height="260" rx="28"/>
    </clipPath>

  </defs>

  <g clip-path="url(#card)">

    <!-- ═══ BACKGROUND ══════════════════════════════════════════════════ -->
    <rect width="760" height="260" fill="#020617"/>
    <rect width="760" height="260" fill="url(#dots)"/>
    <rect width="760" height="260" fill="url(#ambientL)"/>

    <!-- 1px top edge highlight -->
    <rect x="0" y="0" width="760" height="1" fill="rgba(56,189,248,0.18)"/>

    <!-- ═══ LEFT ACCENT BAR ════════════════════════════════════════════ -->
    <rect x="0" y="0" width="5" height="260" fill="url(#accentBar)"/>

    <!-- ═══ ICON BADGE ════════════════════════════════════════════════ -->

    <!-- Outer ambient halo -->
    <circle cx="92" cy="130" r="64" fill="rgba(29,78,216,0.14)"/>
    <!-- Badge body -->
    <circle cx="92" cy="130" r="52"
            fill="url(#badgeBg)"
            stroke="rgba(56,189,248,0.22)"
            stroke-width="1.3"/>
    <!-- Inner ring -->
    <circle cx="92" cy="130" r="44"
            fill="none"
            stroke="rgba(56,189,248,0.09)"
            stroke-width="0.8"/>

    <!-- Tooth path
         Original 200×200 tooth centered at (100.5, 81), h=86, w=59
         Target center: (92, 128), desired height 62px → scale=0.721
         tx = 92 − 100.5×0.721 = 92 − 72.46 = 19.54
         ty = 128 − 81×0.721  = 128 − 58.4  = 69.6              -->
    <g transform="translate(19.5, 69.6) scale(0.721)" filter="url(#toothGlow)">
      <path d="M100 38
               C88 38 72 46 71 58
               C70 69 75 76 81 81
               L78 108
               C77 116 80 124 86 124
               C92 124 94 118 94 110
               L95.5 96
               C96 92 104 92 104.5 96
               L106 110
               C106 118 108 124 114 124
               C120 124 123 116 122 108
               L119 81
               C125 76 130 69 129 58
               C128 46 112 38 100 38 Z"
            fill="url(#toothFill)"/>
      <!-- Crown highlight arc -->
      <path d="M80 51 C83 47 87 45 91 46"
            stroke="rgba(255,255,255,0.7)"
            stroke-width="2.8"
            fill="none"
            stroke-linecap="round"/>
      <!-- Root centre groove -->
      <path d="M100.5 97 L100.5 110"
            stroke="rgba(147,197,253,0.28)"
            stroke-width="1.4"
            fill="none"
            stroke-linecap="round"/>
    </g>

    <!-- 4-point sparkle (top-right of badge) -->
    <g transform="translate(135, 83)" opacity="0.95">
      <path d="M0,-9 L2.1,-2.1 L9,0 L2.1,2.1 L0,9 L-2.1,2.1 L-9,0 L-2.1,-2.1 Z"
            fill="#38BDF8"/>
    </g>
    <circle cx="148" cy="74" r="2.6" fill="rgba(56,189,248,0.52)"/>
    <circle cx="141" cy="70" r="1.6" fill="rgba(56,189,248,0.32)"/>

    <!-- Medical cross (bottom-left accent) -->
    <g transform="translate(53, 168)" opacity="0.28">
      <rect x="-1.4" y="-5.5" width="2.8" height="11" rx="1.4" fill="#38BDF8"/>
      <rect x="-5.5" y="-1.4" width="11"  height="2.8" rx="1.4" fill="#38BDF8"/>
    </g>

    <!-- ═══ TYPOGRAPHY ════════════════════════════════════════════════ -->

    <!-- Category super-label -->
    <text x="170" y="100"
          font-family="'Segoe UI', 'SF Pro Text', system-ui, -apple-system, sans-serif"
          font-size="9"
          font-weight="600"
          letter-spacing="4.2"
          fill="rgba(56,189,248,0.58)">DENTAL PRACTICE MANAGEMENT</text>

    <!-- ── Main brand name ── -->
    <text y="153"
          font-family="'Segoe UI', 'SF Pro Display', system-ui, -apple-system, sans-serif"
          font-size="46"
          xml:space="preserve">
      <!-- "my" — light weight, muted -->
      <tspan x="170"
             font-weight="300"
             fill="#CBD5E1"
             letter-spacing="-0.5">my</tspan><!--
   --><tspan font-weight="800"
             fill="url(#textGrad)"
             letter-spacing="-1.2"
             filter="url(#textGlow)">dental</tspan><!--
   --><tspan font-weight="300"
             fill="#64748B"
             letter-spacing="-0.5">platform</tspan>
    </text>

    <!-- Gradient pill underline beneath "dental"
         At 46px, "my" (weight 300) ≈ 52px wide → dental starts at x≈222
         "dental" (weight 800) ≈ 135px → ends at x≈357               -->
    <rect x="222" y="162" width="135" height="2.8" rx="1.4"
          fill="url(#textGrad)" opacity="0.82"/>

    <!-- Tagline -->
    <text x="170" y="185"
          font-family="'Segoe UI', 'SF Pro Text', system-ui, -apple-system, sans-serif"
          font-size="12"
          font-weight="400"
          letter-spacing="0.15"
          fill="rgba(100,116,139,0.80)">Manage every clinic · Delight every patient</text>

    <!-- ═══ RIGHT DECORATIVE BARS (data-viz feel) ════════════════════ -->
    <g opacity="0.13" transform="translate(648, 62)">
      <rect x="0"  y="0"   width="5.5" height="136" rx="2.75" fill="#38BDF8"/>
      <rect x="14" y="22"  width="5.5" height="92"  rx="2.75" fill="#60A5FA"/>
      <rect x="28" y="9"   width="5.5" height="118" rx="2.75" fill="#38BDF8"/>
      <rect x="42" y="38"  width="5.5" height="60"  rx="2.75" fill="#3B82F6"/>
      <rect x="56" y="16"  width="5.5" height="104" rx="2.75" fill="#1D4ED8"/>
      <rect x="70" y="52"  width="5.5" height="32"  rx="2.75" fill="#38BDF8"/>
      <rect x="84" y="28"  width="5.5" height="80"  rx="2.75" fill="#60A5FA"/>
    </g>

    <!-- Subtle vertical separator before right deco -->
    <line x1="634" y1="72" x2="634" y2="188"
          stroke="rgba(56,189,248,0.07)" stroke-width="1"/>

    <!-- ═══ CARD BORDER ════════════════════════════════════════════════ -->
    <rect width="760" height="260" rx="28"
          fill="none"
          stroke="rgba(56,189,248,0.09)"
          stroke-width="1.5"/>

  </g>
</svg>
