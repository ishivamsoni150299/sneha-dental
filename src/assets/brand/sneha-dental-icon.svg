<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Sneha Dental icon">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="iconTooth" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="100" cy="100" r="96" fill="url(#iconBg)"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="88" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none"/>

  <!-- Tooth icon, centered in 200x200 -->
  <path d="M100 38
    C88 38 72 46 71 58
    C70 69 75 76 81 81
    L78 108
    C77 116 80 124 86 124
    C92 124 94 118 94 110
    L95.5 96
    C96 92 104 92 104.5 96
    L106 110
    C106 118 108 124 114 124
    C120 124 123 116 122 108
    L119 81
    C125 76 130 69 129 58
    C128 46 112 38 100 38 Z"
    fill="url(#iconTooth)"/>

  <!-- Highlight arc -->
  <path d="M80 51 C83 47 87 45 91 46"
    stroke="rgba(255,255,255,0.55)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Sparkle star -->
  <g transform="translate(128, 50)" opacity="0.85">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="white"/>
  </g>
  <circle cx="145" cy="42" r="2.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="138" cy="38" r="1.5" fill="rgba(255,255,255,0.4)"/>
</svg>
