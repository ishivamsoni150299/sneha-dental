<div class="min-h-screen bg-gray-50 flex flex-col">

  <!-- Top Bar -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">

      <!-- Brand -->
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-lg flex items-center justify-center shadow-sm flex-shrink-0">
          <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 3c-2.5 0-4.3 1.4-5.3 3.3-.6 1-.9 2.1-.9 3.2 0 1.9.8 3.3.8 5.1 0 1.4.8 4.7 2.1 6.5.4.6 1 .1 1.2-.7.4-2 .4-3.5 2.1-3.5s1.7 1.5 2.1 3.5c.2.8.8 1.3 1.2.7 1.3-1.8 2.1-5.1 2.1-6.5 0-1.8.8-3.2.8-5.1 0-1.1-.3-2.2-.9-3.2C16.3 4.4 14.5 3 12 3z"/>
          </svg>
        </div>
        <div class="flex items-center gap-2">
          <span class="font-semibold text-sm tracking-tight">
            <span class="text-gray-400">my</span><span class="text-blue-600">dental</span><span class="text-gray-700">platform</span>
          </span>
          <span class="hidden sm:inline text-gray-300 text-xs">|</span>
          <span class="hidden sm:inline text-xs text-gray-400">Super Admin</span>
        </div>
      </div>

      <!-- Nav + User -->
      <div class="flex items-center gap-1">

        <!-- Clinics nav link with count badge -->
        <a routerLink="/business/clinics"
           routerLinkActive="bg-gray-100 text-gray-900"
           class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600
                  hover:text-gray-900 hover:bg-gray-50 transition-colors
                  flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5"/>
          </svg>
          Clinics
          @if (clinicCount() !== null) {
            <span class="ml-0.5 bg-gray-200 text-gray-600 text-[10px] font-semibold
                         px-1.5 py-0.5 rounded-full leading-none">
              {{ clinicCount() }}
            </span>
          }
        </a>

        <!-- Analytics nav link -->
        <a routerLink="/business/analytics"
           routerLinkActive="bg-gray-100 text-gray-900"
           class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600
                  hover:text-gray-900 hover:bg-gray-50 transition-colors
                  flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
          Analytics
        </a>

        <!-- Leads nav link -->
        <a routerLink="/business/leads"
           routerLinkActive="bg-gray-100 text-gray-900"
           class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600
                  hover:text-gray-900 hover:bg-gray-50 transition-colors
                  flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Leads
        </a>

        <!-- Revenue nav link -->
        <a routerLink="/business/revenue"
           routerLinkActive="bg-gray-100 text-gray-900"
           class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600
                  hover:text-gray-900 hover:bg-gray-50 transition-colors
                  flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Revenue
        </a>

        <!-- User + Logout -->
        <div class="ml-3 pl-3 border-l border-gray-200 flex items-center gap-2">
          <span class="hidden sm:flex items-center gap-1.5 text-xs text-gray-400 max-w-[160px]">
            <svg class="w-3 h-3 text-gray-300 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span class="truncate">{{ auth.currentUser()?.email }}</span>
          </span>
          <button (click)="logout()"
                  class="text-xs text-gray-500 hover:text-gray-800 border border-gray-200
                         hover:border-gray-300 px-2.5 py-1.5 rounded-lg transition-colors">
            Sign out
          </button>
        </div>

      </div>
    </div>
  </header>

  <!-- Page Content -->
  <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <router-outlet />
  </main>

</div>
