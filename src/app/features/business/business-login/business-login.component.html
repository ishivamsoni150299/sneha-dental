<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
        <svg class="w-7 h-7 text-white" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 3c-2.5 0-4.3 1.4-5.3 3.3-.6 1-.9 2.1-.9 3.2 0 1.9.8 3.3.8 5.1 0 1.4.8 4.7 2.1 6.5.4.6 1 .1 1.2-.7.4-2 .4-3.5 2.1-3.5s1.7 1.5 2.1 3.5c.2.8.8 1.3 1.2.7 1.3-1.8 2.1-5.1 2.1-6.5 0-1.8.8-3.2.8-5.1 0-1.1-.3-2.2-.9-3.2C16.3 4.4 14.5 3 12 3z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold tracking-tight">
        <span class="text-gray-400 font-semibold">my</span><span class="text-blue-600">dental</span><span class="text-gray-700">platform</span>
      </h1>
      <p class="text-sm text-gray-500 mt-1">Admin access</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="space-y-4">

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input formControlName="email" type="email" autocomplete="email"
                 placeholder="admin@yourplatform.com"
                 class="w-full border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 transition-colors"
                 [class]="isInvalid('email') ? 'border-red-300 focus:ring-red-200' : 'border-gray-200 focus:ring-gray-200'">
          @if (isInvalid('email')) {
            <p class="text-red-500 text-xs mt-1">Enter a valid email address.</p>
          }
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input formControlName="password" type="password" autocomplete="current-password"
                 placeholder="••••••••"
                 class="w-full border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 transition-colors"
                 [class]="isInvalid('password') ? 'border-red-300 focus:ring-red-200' : 'border-gray-200 focus:ring-gray-200'">
          @if (isInvalid('password')) {
            <p class="text-red-500 text-xs mt-1">Password is required.</p>
          }
        </div>

        <!-- Error -->
        @if (error()) {
          <div class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-sm text-red-700">
            {{ error() }}
          </div>
        }

        <!-- Submit -->
        <button type="submit" [disabled]="loading()"
                class="w-full bg-gray-900 hover:bg-gray-800 disabled:opacity-50 text-white py-2.5 rounded-xl font-semibold text-sm transition-colors mt-2">
          @if (loading()) { Signing in… } @else { Sign In }
        </button>

      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      Clinic admin? Visit your clinic domain and go to <span class="text-gray-600 font-medium">/admin/login</span>
    </p>
  </div>
</div>
