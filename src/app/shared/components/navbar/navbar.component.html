<nav class="sticky top-0 z-50 bg-white/85 backdrop-blur-md border-b border-gray-100 shadow-sm relative nav-glow">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 lg:h-18">

      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-2.5 group">
        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center shadow-sm group-hover:bg-blue-700 transition-colors">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 2C9.5 2 7.5 3.5 6 5.5c-.8 1.2-1.2 2.6-1.2 4 0 2 .9 3.5.9 5.5 0 1.5.9 5 2.3 7 .4.6 1.1.1 1.3-.8.4-2.2.4-3.8 1.7-3.8s1.3 1.6 1.7 3.8c.2.9.9 1.4 1.3.8 1.4-2 2.3-5.5 2.3-7 0-2 .9-3.5.9-5.5 0-1.4-.4-2.8-1.2-4C16.5 3.5 14.5 2 12 2z"/>
          </svg>
        </div>
        <span class="font-display text-xl text-gray-900">Sneha<span class="text-blue-600"> Dental</span></span>
      </a>

      <!-- Desktop Nav -->
      <div class="hidden md:flex items-center gap-1">
        @for (link of navLinks; track link.route) {
          <a [routerLink]="link.route"
             routerLinkActive="!text-blue-600 !font-semibold bg-blue-50"
             [routerLinkActiveOptions]="{exact: link.exact}"
             (click)="close()"
             class="px-3.5 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg transition-colors">
            {{ link.label }}
          </a>
        }
        <a routerLink="/appointment"
           class="ml-3 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-semibold shadow-sm transition-all duration-200 hover:shadow-md hover:-translate-y-px">
          Book Appointment
        </a>
      </div>

      <!-- Mobile Toggle -->
      <button (click)="toggle()"
              class="md:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors"
              aria-label="Toggle navigation menu">
        @if (menuOpen()) {
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        } @else {
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        }
      </button>
    </div>

    <!-- Mobile Menu -->
    @if (menuOpen()) {
      <div class="md:hidden border-t border-gray-100 py-3 space-y-0.5">
        @for (link of navLinks; track link.route) {
          <a [routerLink]="link.route"
             routerLinkActive="!text-blue-600 bg-blue-50 !font-semibold"
             [routerLinkActiveOptions]="{exact: link.exact}"
             (click)="close()"
             class="block px-4 py-2.5 text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50 rounded-lg transition-colors">
            {{ link.label }}
          </a>
        }
        <div class="pt-3 pb-1 px-1">
          <a routerLink="/appointment" (click)="close()"
             class="block text-center bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-semibold text-sm transition-colors">
            Book Appointment
          </a>
        </div>
      </div>
    }
  </div>
</nav>
