<div class="glass-panel rounded-2xl p-6 shadow-sm hover:shadow-xl transition-shadow h-full flex flex-col">
  <!-- Stars -->
  <div class="flex gap-0.5 mb-4">
    @for (star of [1,2,3,4,5]; track star) {
      <svg class="w-5 h-5" [class]="star <= rating() ? 'text-yellow-400' : 'text-gray-200'"
           fill="currentColor" viewBox="0 0 20 20">
        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
      </svg>
    }
  </div>

  <!-- Review -->
  <p class="text-gray-700 leading-relaxed mb-5 flex-1 italic">"{{ review() }}"</p>

  <!-- Author -->
  <div class="flex items-center gap-3 mt-auto">
    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center shrink-0">
      <span class="text-blue-700 font-bold text-sm">{{ name().charAt(0) }}</span>
    </div>
    <div>
      <p class="font-semibold text-gray-900 text-sm">{{ name() }}</p>
      @if (location()) {
        <p class="text-gray-400 text-xs">{{ location() }}</p>
      }
    </div>
  </div>
</div>
