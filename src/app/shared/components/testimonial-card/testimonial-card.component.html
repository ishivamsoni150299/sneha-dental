<div class="relative bg-white rounded-2xl p-6 shadow-sm hover:shadow-xl hover:-translate-y-2 transition-all duration-300 h-full flex flex-col overflow-hidden border border-gray-100/80 hover:border-[var(--accent-lt)] group hover-glow">

  <!-- Gradient top accent -->
  <div class="absolute top-0 left-0 right-0 h-0.5 bg-gradient-to-r from-[var(--accent-md)] via-[var(--accent-md)] to-purple-500 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

  <!-- Quote mark -->
  <div class="absolute top-3 right-4 text-[80px] font-serif select-none pointer-events-none text-[var(--accent-lt)] transition-all duration-300 group-hover:scale-110 group-hover:-rotate-6 leading-none">"</div>

  <!-- Stars top -->
  <div class="flex gap-0.5 mb-4 relative">
    @for (star of [1,2,3,4,5]; track star) {
      <svg class="w-4 h-4 transition-all duration-200" [class]="star <= rating() ? 'text-yellow-400 group-hover:scale-110' : 'text-gray-200'"
           fill="currentColor" viewBox="0 0 20 20">
        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
      </svg>
    }
  </div>

  <!-- Review text -->
  <p class="relative text-gray-700 text-sm leading-relaxed mb-5 flex-1 italic group-hover:text-gray-800 transition-colors duration-200">"{{ review() }}"</p>

  <!-- Author row -->
  <div class="flex items-center gap-3 mt-auto pt-4 border-t border-gray-100">
    <div class="w-10 h-10 bg-gradient-to-br from-[var(--accent-md)] to-[var(--accent-dk)] rounded-full flex items-center justify-center shrink-0 shadow-sm group-hover:shadow-md group-hover:scale-105 transition-all duration-200">
      <span class="text-white font-bold text-sm">{{ name().charAt(0) }}</span>
    </div>
    <div class="flex-1 min-w-0">
      <p class="font-semibold text-gray-900 text-sm truncate">{{ name() }}</p>
      @if (location()) {
        <p class="text-gray-400 text-xs">{{ location() }}</p>
      }
    </div>
    <!-- Verified badge -->
    <div class="flex items-center gap-1 bg-green-50 text-green-700 text-[10px] font-semibold px-2 py-1 rounded-full border border-green-100 shrink-0">
      <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
      Verified
    </div>
  </div>
</div>
