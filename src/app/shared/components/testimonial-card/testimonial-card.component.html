<div class="relative glass-panel rounded-2xl p-6 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 h-full flex flex-col overflow-hidden">

  <!-- Giant background quote mark -->
  <div class="absolute top-2 right-4 text-[96px] font-serif text-blue-100 leading-none select-none pointer-events-none" aria-hidden="true">"</div>

  <!-- Review text -->
  <p class="relative text-gray-700 text-sm leading-relaxed mb-5 flex-1 italic">"{{ review() }}"</p>

  <!-- Author row -->
  <div class="flex items-center gap-3 mt-auto pt-4 border-t border-gray-100">
    <!-- Gradient avatar -->
    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center shrink-0 shadow-sm">
      <span class="text-white font-bold text-sm">{{ name().charAt(0) }}</span>
    </div>
    <div class="flex-1 min-w-0">
      <p class="font-semibold text-gray-900 text-sm truncate">{{ name() }}</p>
      @if (location()) {
        <p class="text-gray-400 text-xs">{{ location() }}</p>
      }
    </div>
    <!-- Stars inline with author -->
    <div class="flex gap-0.5 shrink-0">
      @for (star of [1,2,3,4,5]; track star) {
        <svg class="w-3.5 h-3.5" [class]="star <= rating() ? 'text-yellow-400' : 'text-gray-200'"
             fill="currentColor" viewBox="0 0 20 20">
          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
        </svg>
      }
    </div>
  </div>
</div>
