<div class="relative glass-panel rounded-2xl overflow-hidden shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group cursor-default h-full flex flex-col">

  <!-- Accent top bar -->
  <div class="h-1 bg-gradient-to-r from-blue-500 to-indigo-500 w-full shrink-0"></div>

  <div class="p-6 flex flex-col flex-1">
    <!-- Gradient icon -->
    <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center mb-4 shrink-0 shadow-md shadow-blue-200 group-hover:scale-110 group-hover:shadow-lg transition-all duration-300">
      <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="iconPath()"/>
      </svg>
    </div>

    <h3 class="font-bold text-gray-900 text-base mb-2">{{ name() }}</h3>

    @if (description()) {
      <p class="text-gray-500 text-sm leading-relaxed mb-3 flex-1">{{ description() }}</p>
    }

    <div class="mt-auto pt-3 flex items-center justify-between gap-2 flex-wrap border-t border-gray-100">
      @if (benefit()) {
        <p class="text-blue-600 text-sm font-medium flex items-center gap-1.5">
          <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
          {{ benefit() }}
        </p>
      }
      @if (price()) {
        <span class="text-xs font-semibold text-blue-600 bg-blue-50 border border-blue-100 px-2.5 py-1 rounded-full shrink-0">{{ price() }}</span>
      }
    </div>
  </div>
</div>
