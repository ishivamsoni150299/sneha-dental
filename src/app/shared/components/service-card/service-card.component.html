<div class="relative glass-panel rounded-2xl overflow-hidden shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 group cursor-default h-full flex flex-col hover-glow">

  <!-- Top accent bar -->
  <div class="h-[3px] bg-gradient-to-r from-[var(--accent-md)] to-[var(--accent-md)] w-full shrink-0 group-hover:h-1 transition-all duration-300"></div>

  <!-- Hover gradient overlay (slides up) -->
  <div class="absolute inset-0 bg-gradient-to-t from-[var(--accent)] via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none rounded-2xl"></div>

  <div class="p-6 flex flex-col flex-1 relative">

    <!-- Icon -->
    <div class="relative w-14 h-14 mb-5 shrink-0">
      <!-- Glow behind icon -->
      <div class="absolute inset-0 bg-gradient-to-br from-[var(--accent-md)] to-[var(--accent-md)] rounded-2xl blur-md opacity-0 group-hover:opacity-40 transition-opacity duration-300 scale-110"></div>
      <div class="relative w-14 h-14 bg-gradient-to-br from-[var(--accent-md)] to-[var(--accent-dk)] rounded-2xl flex items-center justify-center shadow-md shadow-[var(--accent-bd)] group-hover:scale-110 group-hover:shadow-lg group-hover:shadow-[var(--accent-bd)] transition-all duration-300">
        <svg class="w-7 h-7 text-white group-hover:rotate-[-8deg] transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="iconPath()"/>
        </svg>
      </div>
    </div>

    <h3 class="font-bold text-gray-900 text-base mb-2 group-hover:text-[var(--accent-dk)] transition-colors duration-200">{{ name() }}</h3>

    @if (description()) {
      <p class="text-gray-500 text-sm leading-relaxed mb-3 flex-1">{{ description() }}</p>
    }

    <div class="mt-auto pt-3 flex items-center justify-between gap-2 flex-wrap border-t border-gray-100">
      @if (benefit()) {
        <p class="text-[var(--accent)] text-sm font-medium flex items-center gap-1.5">
          <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
          {{ benefit() }}
        </p>
      }
      <div class="flex items-center gap-2 ml-auto">
        @if (price()) {
          <span class="text-xs font-semibold text-[var(--accent)] bg-[var(--accent-lt)] border border-[var(--accent-lt)] px-2.5 py-1 rounded-full shrink-0">{{ price() }}</span>
        }
        <a [routerLink]="['/appointment']" [queryParams]="{service: name()}"
           class="text-xs font-bold text-[var(--accent)] bg-[var(--accent-lt)] border border-[var(--accent-lt)] px-3 py-1 rounded-full hover:bg-[var(--accent)] hover:text-white hover:border-[var(--accent)] transition-all duration-200 shrink-0">
          Book
        </a>
      </div>
    </div>
  </div>
</div>
