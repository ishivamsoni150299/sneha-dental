<article class="group flex h-full flex-col rounded-2xl border border-gray-200 bg-white p-5 shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:border-[var(--accent-bd)] hover:shadow-lg hover:shadow-gray-200/60">
  <div class="mb-5 flex items-start justify-between gap-4">
    <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl border border-[var(--accent-lt)] bg-[var(--accent-lt)] text-[var(--accent)] transition-colors group-hover:border-[var(--accent-bd)]">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="iconPath()"/>
      </svg>
    </div>

    @if (price()) {
      <span class="rounded-full border border-[var(--accent-lt)] bg-white px-2.5 py-1 text-xs font-bold text-[var(--accent)]">
        {{ price() }}
      </span>
    }
  </div>

  <div class="flex flex-1 flex-col">
    <h3 class="text-base font-bold leading-snug text-gray-900">{{ name() }}</h3>

    @if (description()) {
      <p class="mt-2 flex-1 text-sm leading-relaxed text-gray-500">{{ description() }}</p>
    }

    @if (benefit()) {
      <p class="mt-4 flex items-start gap-2 text-xs font-semibold leading-relaxed text-[var(--accent-dk)]">
        <svg class="mt-0.5 h-3.5 w-3.5 shrink-0 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
        <span>{{ benefit() }}</span>
      </p>
    }

    <a
      [routerLink]="['/appointment']"
      [queryParams]="{ service: name() }"
      class="mt-5 inline-flex min-h-11 w-full items-center justify-center gap-2 rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm font-bold text-gray-700 transition-colors hover:border-[var(--accent-bd)] hover:bg-[var(--accent-lt)] hover:text-[var(--accent-dk)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--accent)] focus-visible:ring-offset-2">
      <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      Book This Service
    </a>
  </div>
</article>
