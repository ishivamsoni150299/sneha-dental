<div class="relative glass-panel rounded-2xl overflow-hidden shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 group cursor-default h-full flex flex-col hover-glow">

  <!-- Top accent bar -->
  <div class="h-[3px] bg-gradient-to-r from-[var(--accent-md)] to-[var(--accent-dk)] w-full shrink-0 group-hover:h-1 transition-all duration-300"></div>

  <!-- Hover gradient overlay (slides up) -->
  <div class="absolute inset-0 bg-gradient-to-t from-[var(--accent)] via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none rounded-2xl"></div>

  <div class="p-6 flex flex-col flex-1 relative">

    <!-- Icon -->
    <div class="relative w-14 h-14 mb-5 shrink-0">
      <div class="absolute inset-0 bg-gradient-to-br from-[var(--accent-md)] to-[var(--accent-md)] rounded-2xl blur-md opacity-0 group-hover:opacity-40 transition-opacity duration-300 scale-110"></div>
      <div class="relative w-14 h-14 bg-gradient-to-br from-[var(--accent-md)] to-[var(--accent-dk)] rounded-2xl flex items-center justify-center shadow-md shadow-[var(--accent-bd)] group-hover:scale-110 group-hover:shadow-lg group-hover:shadow-[var(--accent-bd)] transition-all duration-300">
        <svg class="w-7 h-7 text-white group-hover:rotate-[-8deg] transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="iconPath()"/>
        </svg>
      </div>
    </div>

    <!-- Name -->
    <h3 class="font-bold text-gray-900 text-base mb-2 group-hover:text-white transition-colors duration-200">{{ name() }}</h3>

    <!-- Description -->
    @if (description()) {
      <p class="text-gray-500 text-sm leading-relaxed mb-3 flex-1 group-hover:text-white/80 transition-colors duration-200">{{ description() }}</p>
    }

    <!-- Benefit + Price row -->
    <div class="flex items-center justify-between gap-2 flex-wrap mb-4">
      @if (benefit()) {
        <p class="text-[var(--accent)] text-xs font-medium flex items-center gap-1 group-hover:text-white/90 transition-colors duration-200">
          <svg class="w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
          {{ benefit() }}
        </p>
      }
      @if (price()) {
        <span class="text-xs font-bold text-[var(--accent)] bg-[var(--accent-lt)] border border-[var(--accent-lt)] px-2.5 py-1 rounded-full shrink-0
                     group-hover:bg-white/20 group-hover:text-white group-hover:border-white/30 transition-all duration-200">
          {{ price() }}
        </span>
      }
    </div>

    <!-- CTA — full-width Book button -->
    <a [routerLink]="['/appointment']" [queryParams]="{service: name()}"
       class="relative z-10 mt-auto flex items-center justify-center gap-2 w-full
              bg-[var(--accent-lt)] border border-[var(--accent-lt)] text-[var(--accent)] font-bold text-sm py-2.5 rounded-xl
              group-hover:bg-white group-hover:text-[var(--accent-dk)] group-hover:border-transparent
              hover:shadow-md transition-all duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--accent)] focus-visible:ring-offset-1">
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      Book This Service
    </a>
  </div>
</div>
