<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>mydentalplatform — Professional Websites for Dental Clinics</title>
  <base href="/">
  <!-- Viewport: viewport-fit=cover fills the iPhone notch/island area -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Ready-to-launch dental clinic websites with online booking, WhatsApp integration and AI voice receptionist. Live in 24 hours. From ₹499/month.">
  <meta name="robots" content="index,follow">

  <!-- PWA — "Add to Home Screen" gives full-screen app with no URL bar or tab bar -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#2563eb">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="My Dental">
  <!-- black-translucent = status bar overlaps the app (content goes edge-to-edge) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- Touch icons shown when user taps "Add to Home Screen" on iOS -->
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">

  <!-- Android Chrome PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="My Dental">

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <app-root>
    <!-- Pre-bootstrap splash — replaced the moment Angular renders -->
    <div id="app-splash" style="
      position:fixed;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#f8fafc;
      font-family:'Plus Jakarta Sans',system-ui,sans-serif;
      z-index:9999;">
      <!-- Logo mark -->
      <div style="
        width:56px;height:56px;
        background:linear-gradient(135deg,#3b82f6,#6366f1);
        border-radius:16px;
        display:flex;align-items:center;justify-content:center;
        box-shadow:0 8px 24px rgba(99,102,241,.35);
        margin-bottom:16px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
          <path d="M12 2.5c-2.4 0-4.2 1.5-5.1 3.4-.5.9-.7 2-.7 3 0 1.8.8 3.1.8 4.9 0 1.3.8 4.5 2 6 .4.5.9.1 1.1-.6.3-1.8.4-3.2 1.9-3.2s1.6 1.4 1.9 3.2c.2.7.7 1.1 1.1.6 1.2-1.5 2-4.7 2-6 0-1.8.8-3.1.8-4.9 0-1-.2-2.1-.7-3C16.2 4 14.4 2.5 12 2.5z"/>
        </svg>
      </div>
      <!-- Wordmark -->
      <p style="font-size:17px;font-weight:700;letter-spacing:-.3px;color:#111827;margin:0 0 24px;">
        <span style="color:#111827;">mydental</span><span style="color:#2563eb;">platform</span>
      </p>
      <!-- Spinner -->
      <div style="
        width:28px;height:28px;
        border:3px solid #e2e8f0;
        border-top-color:#2563eb;
        border-radius:50%;
        animation:spin .7s linear infinite;">
      </div>
    </div>
    <style>
      @keyframes spin { to { transform:rotate(360deg); } }
    </style>
  </app-root>
</body>
</html>
