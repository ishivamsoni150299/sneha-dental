name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Provide dummy Firebase config so the build doesn't fail on missing env vars.
          # Real secrets are injected at Vercel deploy time, not here.
          NG_APP_FIREBASE_API_KEY:              ${{ secrets.NG_APP_FIREBASE_API_KEY || 'ci-placeholder' }}
          NG_APP_FIREBASE_AUTH_DOMAIN:          ${{ secrets.NG_APP_FIREBASE_AUTH_DOMAIN || 'ci-placeholder' }}
          NG_APP_FIREBASE_PROJECT_ID:           ${{ secrets.NG_APP_FIREBASE_PROJECT_ID || 'ci-placeholder' }}
          NG_APP_FIREBASE_STORAGE_BUCKET:       ${{ secrets.NG_APP_FIREBASE_STORAGE_BUCKET || 'ci-placeholder' }}
          NG_APP_FIREBASE_MESSAGING_SENDER_ID:  ${{ secrets.NG_APP_FIREBASE_MESSAGING_SENDER_ID || 'ci-placeholder' }}
          NG_APP_FIREBASE_APP_ID:               ${{ secrets.NG_APP_FIREBASE_APP_ID || 'ci-placeholder' }}
